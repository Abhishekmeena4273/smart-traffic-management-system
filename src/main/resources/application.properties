# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false

# PostgreSQL Database (Production)
# Use environment variables for deployment
# DB_URL, DB_USER, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trafficdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Initialize - let Hibernate create tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# YOLO Service
yolo.service.url=http://localhost:5001

# Multipart upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Static resources
spring.web.resources.static-locations=classpath:/static/

# Traffic Configuration
# Opposite lane position: false = right, true = left
traffic.opposite.position.1=false
traffic.opposite.position.2=false
traffic.opposite.position.3=false
traffic.opposite.position.4=false
