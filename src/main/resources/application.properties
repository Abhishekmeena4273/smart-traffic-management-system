# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false

# Database - H2 (default, embedded)
spring.datasource.url=jdbc:h2:file:./data/trafficdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Initialize
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# YOLO Detection (in-process via ONNX Runtime)
yolo.confidence.threshold=0.25
yolo.iou.threshold=0.45

# Multipart upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Static resources
spring.web.resources.static-locations=classpath:/static/

# Traffic Configuration
traffic.opposite.position.1=false
traffic.opposite.position.2=false
traffic.opposite.position.3=false
traffic.opposite.position.4=false

# Actuator - health endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
