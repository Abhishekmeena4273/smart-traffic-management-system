# Server
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=true

# Database - PostgreSQL (production)
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Initialize
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# YOLO Detection (in-process via ONNX Runtime)
yolo.confidence.threshold=0.25
yolo.iou.threshold=0.45

# Multipart upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Static resources
spring.web.resources.cache.period=86400
spring.web.resources.static-locations=classpath:/static/

# Traffic Configuration
traffic.opposite.position.1=false
traffic.opposite.position.2=false
traffic.opposite.position.3=false
traffic.opposite.position.4=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
